name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-bun:
    runs-on: ubuntu-latest
    name: Test with Bun (Primary Runtime)
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: bun run lint

      - name: Run format check  
        run: bun run format --check

      - name: Run tests with Bun
        run: bun test --coverage

      - name: Build package
        run: bun run build

      - name: Verify build outputs
        run: |
          test -f dist/index.js
          test -f dist/index.mjs  
          test -f dist/index.d.ts
          echo "Build outputs verified successfully"

  test-node-compatibility:
    runs-on: ubuntu-latest
    name: Test Node.js Compatibility
    needs: test-bun
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Bun for building
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build for Node.js compatibility
        run: bun run build

      - name: Test Node.js import compatibility
        run: |
          echo "Testing Node.js compatibility..."
          node -e "try { require('./dist/index.js'); console.log('✅ CJS import works'); } catch(e) { console.log('❌ CJS import failed:', e.message); }"
          node -e "import('./dist/index.mjs').then(() => console.log('✅ ESM import works')).catch(e => console.log('❌ ESM import failed:', e.message))"

  verify-npm-package:
    runs-on: ubuntu-latest
    name: Verify npm package structure
    needs: test-bun
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install and build
        run: |
          bun install
          bun run build

      - name: Verify package structure
        run: |
          echo "Verifying npm package structure..."
          test -f package.json && echo "✅ package.json exists"
          test -f dist/index.js && echo "✅ dist/index.js exists"
          test -f dist/index.mjs && echo "✅ dist/index.mjs exists"
          test -f dist/index.d.ts && echo "✅ dist/index.d.ts exists"
          test -f LICENSE && echo "✅ LICENSE exists"
          test -f README.md && echo "✅ README.md exists"
          test -f CHANGELOG.md && echo "✅ CHANGELOG.md exists"
          echo "Package structure verification complete"